# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 - development) ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Production MySQL (uncomment when deploying with RDS) ──────────────────────
# spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ecommerce-super-secret-key-at-least-32-chars-long-!}
app.jwt.expiration=86400000

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN
